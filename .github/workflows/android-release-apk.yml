name: Android Release APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach APK to (e.g. v1.0.1)"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build-and-attach-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout selected tag (manual runs)
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ github.event.inputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Prepare APK names
        run: |
          mkdir -p dist
          VERSION_TAG="${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}"
          cp android/app/build/outputs/apk/release/app-release.apk "dist/FoodTrip-${VERSION_TAG}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "dist/FoodTrip-latest.apk"

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            dist/FoodTrip-latest.apk
            dist/FoodTrip-${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}.apk
